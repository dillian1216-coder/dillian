<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>倒數計時器</title>
  <style>
    :root {
      --bg-1: #fff6e8;
      --bg-2: #ffd7a8;
      --card: rgba(255, 252, 246, 0.88);
      --text: #24170e;
      --muted: #6d5746;
      --accent: #d56b1d;
      --accent-dark: #9f4b10;
      --accent-soft: #ffe4c7;
      --shadow: 0 24px 60px rgba(121, 63, 22, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Avenir Next", "PingFang TC", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.92), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 201, 140, 0.9), transparent 25%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    }

    .panel {
      width: min(100%, 560px);
      padding: 32px;
      border-radius: 28px;
      background: var(--card);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 0.86rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-dark);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3.2rem);
      line-height: 1;
    }

    .subtext {
      margin: 12px 0 24px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .timer {
      margin: 18px 0 26px;
      padding: 24px;
      border-radius: 24px;
      text-align: center;
      background: linear-gradient(180deg, #fff, #fff5e9);
      border: 1px solid rgba(213, 107, 29, 0.15);
    }

    .time {
      font-size: clamp(3.4rem, 14vw, 5.6rem);
      font-weight: 800;
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      min-height: 1.5em;
    }

    .preset-row,
    .actions {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, 1fr);
    }

    .preset-row {
      margin-bottom: 18px;
    }

    .custom-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 1rem;
      background: #fff;
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(36, 23, 14, 0.08);
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 15px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .preset {
      background: var(--accent-soft);
      color: var(--accent-dark);
    }

    .primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 12px 24px rgba(213, 107, 29, 0.26);
    }

    .secondary {
      background: #fff;
      color: var(--text);
    }

    .is-finished .timer {
      background: linear-gradient(180deg, #fff7ef, #ffe8cc);
      border-color: rgba(213, 107, 29, 0.35);
    }

    @media (max-width: 560px) {
      .panel {
        padding: 22px;
        border-radius: 22px;
      }

      .preset-row,
      .actions,
      .custom-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="panel" id="app">
    <p class="eyebrow">Countdown Demo</p>
    <h1>倒數計時器</h1>
    <p class="subtext">可直接選快速時間，也可以輸入自訂分鐘數。按下開始後就會即時倒數，結束時會提示你。</p>

    <section class="timer" aria-live="polite">
      <div class="time" id="timeDisplay">05:00</div>
      <div class="status" id="statusText">準備開始 5 分鐘倒數</div>
    </section>

    <div class="preset-row">
      <button class="preset" data-seconds="60">1 分鐘</button>
      <button class="preset" data-seconds="300">5 分鐘</button>
      <button class="preset" data-seconds="1500">25 分鐘</button>
    </div>

    <div class="custom-row">
      <input id="minutesInput" type="number" min="1" max="999" value="10" placeholder="輸入分鐘數">
      <button class="primary" id="applyCustom">設定時間</button>
    </div>

    <div class="actions">
      <button class="primary" id="startBtn">開始</button>
      <button class="secondary" id="pauseBtn">暫停</button>
      <button class="secondary" id="resetBtn">重設</button>
    </div>
  </main>

  <script>
    const app = document.getElementById("app");
    const timeDisplay = document.getElementById("timeDisplay");
    const statusText = document.getElementById("statusText");
    const minutesInput = document.getElementById("minutesInput");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const applyCustom = document.getElementById("applyCustom");
    const presetButtons = document.querySelectorAll("[data-seconds]");

    let totalSeconds = 300;
    let remainingSeconds = 300;
    let timerId = null;
    let endTime = 0;

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function render() {
      timeDisplay.textContent = formatTime(remainingSeconds);
    }

    function setStatus(message) {
      statusText.textContent = message;
    }

    function clearTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function setDuration(seconds) {
      clearTimer();
      totalSeconds = seconds;
      remainingSeconds = seconds;
      app.classList.remove("is-finished");
      render();
      setStatus(`準備開始 ${Math.floor(seconds / 60)} 分鐘倒數`);
    }

    function finishTimer() {
      clearTimer();
      remainingSeconds = 0;
      render();
      app.classList.add("is-finished");
      setStatus("時間到，可以休息一下或重新開始。");
      document.title = "時間到";
    }

    function tick() {
      const secondsLeft = Math.max(0, Math.round((endTime - Date.now()) / 1000));
      remainingSeconds = secondsLeft;
      render();

      if (secondsLeft <= 0) {
        finishTimer();
      }
    }

    startBtn.addEventListener("click", () => {
      clearTimer();
      app.classList.remove("is-finished");
      endTime = Date.now() + remainingSeconds * 1000;
      setStatus("倒數進行中...");
      document.title = `${formatTime(remainingSeconds)} 倒數中`;
      tick();
      timerId = setInterval(() => {
        tick();
        document.title = remainingSeconds > 0 ? `${formatTime(remainingSeconds)} 倒數中` : "時間到";
      }, 250);
    });

    pauseBtn.addEventListener("click", () => {
      clearTimer();
      setStatus(`已暫停，剩下 ${formatTime(remainingSeconds)}`);
      document.title = "倒數已暫停";
    });

    resetBtn.addEventListener("click", () => {
      setDuration(totalSeconds);
      document.title = "倒數計時器";
    });

    applyCustom.addEventListener("click", () => {
      const minutes = Number(minutesInput.value);
      if (!Number.isFinite(minutes) || minutes < 1) {
        setStatus("請輸入 1 分鐘以上的數字。");
        return;
      }

      setDuration(minutes * 60);
      document.title = "倒數計時器";
    });

    presetButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setDuration(Number(button.dataset.seconds));
        document.title = "倒數計時器";
      });
    });

    render();
  </script>
</body>
</html>
